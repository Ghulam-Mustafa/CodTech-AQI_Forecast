<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AQI Forecast{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">🌬️ AQI Forecast</div>
    <nav>
      <a href="/">Dashboard</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Data source is configurable (WAQI / OpenWeatherMap / demo mode). See README for setup.</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
